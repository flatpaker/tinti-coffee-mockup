kind = "web"
previewPath = "/"
title = "Premium Coffee Brand"
version = "1.0.0"
id = "artifacts/coffee-brand"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 23414

[services.development]
run = "pnpm --filter @workspace/coffee-brand run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/coffee-brand", "run", "build" ]
publicDir = "artifacts/coffee-brand/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "23414"
BASE_PATH = "/"
